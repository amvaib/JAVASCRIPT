<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELIVERY CALCULATOR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>AMAZON SHIPPING CALCULATOR</h1>

    <input placeholder="Cost of Order" class="costinput" onkeydown="
    handleCostKeydown(event);">
    <button onclick="
    calculateTotal();" class="calculate-button">
        CALCULATE
    </button>

    <p class="totalcost"></p>


    <script>

        function handleCostKeydown(event){
            if(event.key === 'Enter'){
                calculateTotal();
            }
        }


        function calculateTotal(){
            const inputElement = document.querySelector('.costinput')

            let cost = Number(inputElement.value);
            if(cost <= 40){
                cost = cost + 10;

            } 

            else if(cost>40){
                cost = cost;
            }

            document.querySelector('.totalcost').innerHTML = `$${cost}`}
        

    </script>
    
</body>
</html>
