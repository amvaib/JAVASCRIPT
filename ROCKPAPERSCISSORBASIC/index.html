<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ROCK PAPER SCISSOR</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body style="background-color: #8294c4">
    <div class="heading">
      <h1>ROCK PAPER SCISSOR</h1>
    </div>

    <div class="buttons flex">
      <div class="button1">
        <button
          onclick="
                
                pickComputerMove();

                if(computerMove === 'ROCK'){
                    result = 'TIE'

                }

                else if(computerMove === 'PAPER'){
                    result = 'YOU LOST'

                }

                else if(computerMove === 'SCISSOR'){
                    result = 'YOU WON'

                }

                check();
            

                alert(`You picked ROCK . Computer picked ${computerMove}. ${result}
                WINS: ${score.WINS}
            LOSSES: ${score.LOSSES}
            TIES: ${score.TIES}`)

                "
        >
          🪨
        </button>
      </div>
      <div class="button2">
        <button
          onclick="   
                
            pickComputerMove();

            if(computerMove === 'ROCK'){
                result = 'YOU WON'

            }

            else if(computerMove === 'PAPER'){
                result = 'TIE'

            }

            else if(computerMove === 'SCISSOR'){
                result = 'YOU LOST'

            } 

            check();
            

            alert(`You picked PAPER . Computer picked ${computerMove}. ${result}
            WINS: ${score.WINS}
            LOSSES: ${score.LOSSES}
            TIES: ${score.TIES}`)

            "
        >
          📄
        </button>
      </div>
      <div class="button3">
        <button
          onclick="

            pickComputerMove();
            

            if(computerMove === 'ROCK'){
                result = 'YOU LOST'

            }

            else if(computerMove === 'PAPER'){
                result = 'YOU WON'

            }

            else if(computerMove === 'SCISSOR'){
                result = 'TIE'

            }

            check();
            
            

            

            alert(`You picked SCISSOR . Computer picked ${computerMove}. ${result}
            WINS: ${score.WINS}
            LOSSES: ${score.LOSSES}
            TIES: ${score.TIES}
            
            
            `)

            "
        >
          ✂️
        </button>


      </div>

      
    </div>

    <div class="button4 ">
        <button onclick="

            score.WINS = 0;
            score.LOSSES = 0;
            score.TIES = 0;

            alert(`YOUR SCORE HAS BEEN RESET
            WINS: ${score.WINS}
            LOSSES: ${score.LOSSES}
            TIES: ${score.TIES}
            
            
            `)


        
            
            ">
            RESET
        </button>
      </div>

    <script>
      const randomNumber = Math.random();
      let computerMove = "";
      let result = "";

      score = JSON.parse(localStorage.getItem('score'));

      function pickComputerMove() {
        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = "ROCK";
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = "PAPER";
        } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
          computerMove = "SCISSOR";
        }



        return computerMove;
      }

      function check(){
        if (result === 'YOU WON'){
                    score.WINS = score.WINS + 1;
                }
    
                else if(result === 'YOU LOST'){
                    score.LOSSES = score.LOSSES + 1;
    
                }
    
                else if(result === 'TIE'){
                    score.TIES = score.TIES + 1;
                    
                }

                
      }

      localStorage.setItem('score' , JSON.stringify(score));
      

      const score = {
        WINS: 0,
        LOSSES: 0,
        TIES: 0,
      };
    </script>
  </body>
</html>
